  date: 2022-12-08
  content:
    ja: |
      <del>2022年12月中旬</del> <ins>2023年1月上旬</ins> に，東京大学のZoomにGoogleでサインインする機能を無効化する設定変更を行います．
      UTokyo Accountでサインインして利用する所定のZoomアカウントをお使いの方には，この設定変更による影響はありません．
      所定と異なる `@g.ecc.u-tokyo.ac.jp` などのアカウントでZoomをお使いの方は，この設定変更によりサインインできなくなる場合がありますので，各自で「[UTokyo Account以外のサインインでのZoomの利用について](/notice/zoom-address-new)」のページの案内に従って所定のアカウントへの変更をしてください．
      <small>（※2022-12-22 実施時期を修正しました）</small>
    en: |
      In <del>mid-December 2022</del> <ins>early January 2023</ins>, a configuration change will be made to disable the ability to sign in to UTokyo's Zoom with a Google account.
      If you are using the designated Zoom account signed in with your UTokyo Account, this change will not affect you.
      If you are using Zoom with an account such as `@g.ecc.u-tokyo.ac.jp` that is not the designated account, you may be unable to sign in after this change. Please follow the instructions on "[Using Zoom with a sign-in method other than UTokyo Account](/notice/zoom-address-new)" to switch to the designated account.
      <small>(* 2022-12-22: Implementation schedule has been revised)</small>
